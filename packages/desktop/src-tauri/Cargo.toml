[package]
name = "meucofri-desktop"
version = "2.0.0"
description = "Desktop shell for MeuCofri"
authors = ["yannb"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0.6", features = [] }

[dependencies]
serde_json = "1"
tauri = { version = "2.8.5", features = ["tray-icon"] }
tauri-plugin-autostart = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-updater = "2"

[features]
default = []
