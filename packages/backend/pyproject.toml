[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Yann Mello", email = "ybamello@hotmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "alembic>=1.18.4",
    "argon2-cffi>=25.1.0",
    "fastapi>=0.135.1",
    "sqlalchemy>=2.0.48",
    "uvicorn>=0.38.0",
]

[project.scripts]
backend = "finance_app.cli:main"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pyinstaller>=6.16.0",
    "pytest>=9.0.2",
]

[tool.uv.build-backend]
module-name = "finance_app"
