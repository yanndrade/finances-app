name: windows-release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Versao opcional para sobrescrever o incremento automatico (ex: 2.0.7)"
        required: false
        type: string
      release_name:
        description: "Nome opcional da release"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: pwsh
        run: |
          $versionOverride = "${{ inputs.version_override }}"

          if (-not [string]::IsNullOrWhiteSpace($versionOverride)) {
            if ($versionOverride -notmatch '^\d+\.\d+\.\d+$') {
              throw "version_override must use semantic version format major.minor.patch."
            }
            $releaseVersion = $versionOverride
          } else {
            $existingPatches = git tag --list "v2.0.*" `
              | Where-Object { $_ -match '^v2\.0\.(\d+)$' } `
              | ForEach-Object { [int]$Matches[1] }

            if ($existingPatches.Count -eq 0) {
              $nextPatch = 0
            } else {
              $nextPatch = (($existingPatches | Measure-Object -Maximum).Maximum + 1)
            }

            $releaseVersion = "2.0.$nextPatch"
          }

          $releaseTag = "v$releaseVersion"
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/frontend/package-lock.json
            packages/desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri -> target

      - name: Enforce signing secrets on manual releases
        shell: pwsh
        run: |
          $cert = $env:WINDOWS_CERT_PFX_BASE64
          $password = $env:WINDOWS_CERT_PASSWORD
          $updaterKey = $env:TAURI_SIGNING_PRIVATE_KEY
          $updaterPassword = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          if ([string]::IsNullOrWhiteSpace($cert) -or [string]::IsNullOrWhiteSpace($password)) {
            throw "Missing Windows signing secrets. Configure WINDOWS_CERT_PFX_BASE64 and WINDOWS_CERT_PASSWORD."
          }
          if ([string]::IsNullOrWhiteSpace($updaterKey) -or [string]::IsNullOrWhiteSpace($updaterPassword)) {
            throw "Missing updater signing secrets. Configure TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
          }

      - name: Prepare signing certificate
        id: signing
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' && env.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-certificate.pfx"
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64)
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows release
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_PATH: ${{ steps.signing.outputs.cert_path }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ env.WINDOWS_CERT_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: ${{ env.WINDOWS_SIGN_TIMESTAMP_URL }}
        run: ./scripts/build-release-windows.ps1 -ReleaseVersion $env:RELEASE_VERSION

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $releaseName = "${{ inputs.release_name }}"
          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "Windows Release $env:RELEASE_TAG"
          }
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare updater artifacts
        shell: pwsh
        run: |
          ./scripts/prepare-updater-release.ps1 `
            -ReleaseVersion $env:RELEASE_VERSION `
            -ReleaseTag $env:RELEASE_TAG `
            -Repository "${{ github.repository }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/msi/*.sig
            packages/desktop/src-tauri/target/release/bundle/msi/latest.json
          if-no-files-found: error

      - name: Create release tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $existingTag = git ls-remote --tags origin $env:RELEASE_TAG
          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            throw "Tag $env:RELEASE_TAG already exists on origin. Use a new version."
          }

          git tag $env:RELEASE_TAG $env:GITHUB_SHA
          git push origin refs/tags/$env:RELEASE_TAG

      - name: Cleanup signing certificate
        if: always() && steps.signing.outputs.cert_path != ''
        shell: pwsh
        run: |
          Remove-Item -Path "${{ steps.signing.outputs.cert_path }}" -Force -ErrorAction SilentlyContinue

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/msi/*.sig
            packages/desktop/src-tauri/target/release/bundle/msi/latest.json
